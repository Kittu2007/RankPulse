<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RankPulse — Social Media SEO Intelligence</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;400;500;600;700&display=swap');
/* ═══════════════════════════════════════════════════════════════
   RANKPULSE DESIGN SYSTEM — NEO-BRUTALIST
   Colors: #FFFCE8 bg · #111111 black · #FF3B00 red · #22C55E green
   Type: Bebas Neue display · Space Grotesk body
═══════════════════════════════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fffce8;--black:#111111;--red:#ff3b00;--white:#ffffff;
  --green:#16a34a;--green-light:#dcfce7;--amber:#d97706;--amber-light:#fef3c7;
  --blue:#1d4ed8;--blue-light:#dbeafe;--ig:#e1306c;--li:#0a66c2;
  --border:2px solid #111111;--border-thin:1px solid #111111;
  --border-light:1px solid #e8e4d0;
  --font-d:'Bebas Neue','Arial Black',Impact,'Franklin Gothic Heavy',sans-serif;--font-b:'Space Grotesk',system-ui,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif;
  --radius:0px;
}
html,body{font-family:var(--font-b);background:var(--bg);color:var(--black);min-height:100vh;font-size:14px}
a{text-decoration:none;color:inherit;cursor:pointer}
button{cursor:pointer;font-family:var(--font-b)}
input,textarea,select{font-family:var(--font-b);outline:none}
textarea{resize:vertical}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:#bbb;border-radius:0}

/* ── TYPOGRAPHY ── */
.d1{font-family:var(--font-d);font-size:80px;line-height:.92;letter-spacing:1px}
.d2{font-family:var(--font-d);font-size:56px;line-height:.95;letter-spacing:1px}
.d3{font-family:var(--font-d);font-size:40px;line-height:1;letter-spacing:1px}
.d4{font-family:var(--font-d);font-size:28px;line-height:1;letter-spacing:.5px}
.d5{font-family:var(--font-d);font-size:22px;letter-spacing:.5px}
.h1{font-size:24px;font-weight:700;line-height:1.2}
.h2{font-size:18px;font-weight:700;line-height:1.3}
.h3{font-size:15px;font-weight:600}
.body{font-size:14px;font-weight:400;line-height:1.6}
.body-sm{font-size:12px;font-weight:400;line-height:1.5;color:#555}
.label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase}
.label-sm{font-size:9px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase}
.mono{font-family:'Courier New',monospace;font-size:12px}
.inv{background:var(--black);color:var(--bg);padding:0 5px;display:inline-block}
.acc{color:var(--red)}

/* ── LAYOUT ── */
.flex{display:flex}.flex-col{flex-direction:column}
.items-center{align-items:center}.items-start{align-items:flex-start}
.justify-between{justify-content:space-between}.justify-center{justify-content:center}
.gap-4{gap:4px}.gap-6{gap:6px}.gap-8{gap:8px}.gap-10{gap:10px}
.gap-12{gap:12px}.gap-16{gap:16px}.gap-20{gap:20px}.gap-24{gap:24px}
.flex-1{flex:1}.flex-wrap{flex-wrap:wrap}
.grid-2{display:grid;grid-template-columns:1fr 1fr}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr}
.grid-4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr}
.border{border:var(--border)}.border-b{border-bottom:var(--border)}
.border-r{border-right:var(--border)}.border-t{border-top:var(--border)}
.border-light{border:var(--border-light)}.border-b-light{border-bottom:var(--border-light)}
.w-full{width:100%}.h-full{height:100%}
.text-center{text-align:center}.text-right{text-align:right}
.bg-black{background:var(--black)}.bg-white{background:var(--white)}
.bg-red{background:var(--red)}.bg-yellow{background:var(--bg)}
.text-white{color:var(--white)}.text-red{color:var(--red)}
.text-green{color:var(--green)}.text-amber{color:var(--amber)}
.text-muted{color:#777}.text-dimmed{color:#999}
.overflow-hidden{overflow:hidden}.min-h-screen{min-height:100vh}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;border:var(--border);padding:9px 20px;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;transition:opacity .15s;white-space:nowrap}
.btn:hover{opacity:.88}
.btn-red{background:var(--red);color:var(--bg);border-color:var(--black)}
.btn-black{background:var(--black);color:var(--bg);border-color:var(--black)}
.btn-outline{background:var(--bg);color:var(--black);border-color:var(--black)}
.btn-white{background:var(--white);color:var(--black);border-color:var(--black)}
.btn-ghost{background:transparent;color:#888;border-color:#444}
.btn-sm{padding:5px 12px;font-size:10px}
.btn-lg{padding:13px 28px;font-size:13px}

/* ── BADGES & TAGS ── */
.badge{display:inline-flex;align-items:center;gap:4px;font-size:9px;font-weight:700;padding:3px 9px;border:1.5px solid;letter-spacing:1px;text-transform:uppercase}
.badge-ok{border-color:var(--green);color:var(--green);background:var(--green-light)}
.badge-warn{border-color:var(--amber);color:var(--amber);background:var(--amber-light)}
.badge-err{border-color:var(--red);color:var(--red);background:#fff5f5}
.badge-blue{border-color:var(--blue);color:var(--blue);background:var(--blue-light)}
.badge-black{border-color:var(--black);color:var(--bg);background:var(--black)}
.platform-tag{font-size:9px;font-weight:700;padding:3px 10px;border:1.5px solid;letter-spacing:1px;text-transform:uppercase}
.tag-ig{border-color:var(--ig);color:var(--ig);background:#fff0f3}
.tag-li{border-color:var(--li);color:var(--li);background:#eff6ff}
.tag-x{border-color:#555;color:#444;background:#f5f5f5}

/* ── FORM ELEMENTS ── */
.input{border:var(--border);padding:9px 12px;font-size:13px;color:var(--black);background:var(--white);width:100%}
.input:focus{outline:2px solid var(--red);outline-offset:-2px}
.textarea{border:var(--border);padding:10px 12px;font-size:13px;color:var(--black);background:var(--white);width:100%;min-height:80px}
.textarea:focus{outline:2px solid var(--red);outline-offset:-2px}
.select{border:var(--border);padding:8px 12px;font-size:12px;color:var(--black);background:var(--white);appearance:none;cursor:pointer}

/* ── CARDS ── */
.card{border:var(--border);background:var(--white);padding:20px}
.card-dark{border:var(--border);background:var(--black);padding:20px}
.stat-card{border:var(--border);padding:16px 20px}

/* ── PROGRESS BARS ── */
.progress-wrap{height:4px;background:#e8e4d0;overflow:hidden}
.progress-fill{height:100%;transition:width .3s}
.progress-hi{background:var(--green)}.progress-md{background:var(--amber)}.progress-lo{background:var(--red)}

/* ── TABLES ── */
.table{width:100%;border-collapse:collapse}
.table th{padding:10px 14px;text-align:left;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;border-bottom:var(--border);background:var(--black);color:var(--bg)}
.table td{padding:10px 14px;font-size:12px;border-bottom:var(--border-light);vertical-align:middle}
.table tr:hover td{background:#fffbf0}
.table tr:last-child td{border-bottom:none}

/* ── NAV (TOP) ── */
#top-nav{display:flex;align-items:stretch;border-bottom:var(--border);background:var(--black);height:52px;position:sticky;top:0;z-index:100}
.nav-logo-wrap{display:flex;align-items:center;border-right:var(--border)}
.nav-logo-red{background:var(--red);padding:4px 10px;display:flex;align-items:center;margin:8px 0 8px 12px}
.nav-logo-text{font-family:var(--font-d);font-size:24px;letter-spacing:3px;color:var(--bg);line-height:1}
.nav-logo-sub{font-size:8px;color:#555;letter-spacing:2px;padding:0 10px 0 8px;line-height:1.3}
.nav-items{display:flex;flex:1}
.nav-item{display:flex;align-items:center;padding:0 16px;font-size:11px;font-weight:600;color:#888;letter-spacing:.5px;border-right:1px solid #222;cursor:pointer;transition:all .15s;text-transform:uppercase;white-space:nowrap}
.nav-item:hover{color:#ccc;background:#1a1a1a}
.nav-item.active{color:var(--bg);background:#1a1a1a;border-bottom:2px solid var(--red)}
.nav-right{display:flex;align-items:center;gap:8px;padding:0 14px;margin-left:auto;border-left:1px solid #222}

/* ── SIDEBAR (DASHBOARD) ── */
.app-shell{display:flex;min-height:calc(100vh - 52px)}
.sidebar{width:220px;background:var(--black);border-right:var(--border);display:flex;flex-direction:column;flex-shrink:0;padding:8px 0}
.sidebar-section{padding:12px 16px 4px;font-size:9px;color:#444;letter-spacing:3px;font-weight:700;text-transform:uppercase}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:9px 16px;font-size:12px;font-weight:500;color:#777;cursor:pointer;border-left:3px solid transparent;transition:all .15s}
.sidebar-item:hover{color:#ccc;background:#1a1a1a}
.sidebar-item.active{color:var(--bg);background:#1a1a1a;border-left-color:var(--red)}
.sidebar-icon{width:16px;height:16px;flex-shrink:0;opacity:.7}
.main-content{flex:1;overflow:auto;background:var(--bg)}

/* ── PAGE HEADER ── */
.page-header{display:flex;align-items:center;justify-content:space-between;padding:20px 28px;border-bottom:var(--border);background:var(--bg)}
.page-title-group{}
.page-kicker{font-size:9px;font-weight:700;letter-spacing:3px;color:var(--red);text-transform:uppercase;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.page-kicker::before{content:'';display:block;width:20px;height:2px;background:var(--red)}

/* ── METRIC STRIP ── */
.metric-strip{display:grid;grid-template-columns:repeat(4,1fr);background:var(--black);border-bottom:var(--border)}
.ms-cell{padding:16px 20px;border-right:1px solid #222}
.ms-cell:last-child{border-right:none}
.ms-num{font-family:var(--font-d);font-size:36px;letter-spacing:-1px;line-height:1}
.ms-num.c-white{color:var(--bg)}
.ms-num.c-red{color:var(--red)}
.ms-num.c-green{color:#4ade80}
.ms-num.c-amber{color:#fbbf24}
.ms-label{font-size:9px;color:#555;letter-spacing:2px;text-transform:uppercase;margin-top:2px}
.ms-delta{font-size:11px;font-weight:600;margin-top:3px}
.ms-delta.up{color:#4ade80}.ms-delta.dn{color:var(--red)}.ms-delta.flat{color:#888}

/* ── SCORE GAUGE ── */
.score-gauge{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}
.score-big{font-family:var(--font-d);font-size:96px;line-height:1;letter-spacing:-4px}
.score-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#888}

/* ── PLATFORM SCORE GRID ── */
.platform-score-grid{display:grid;grid-template-columns:repeat(3,1fr)}
.psg-cell{padding:14px;text-align:center}
.psg-name{font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.psg-score{font-family:var(--font-d);font-size:36px;line-height:1;letter-spacing:-1px}

/* ── PLATFORM BREAKDOWN TABLE ── */
.plat-breakdown{display:grid;grid-template-columns:1fr 1fr 1fr;border-top:var(--border)}
.pb-col{border-right:var(--border)}
.pb-col:last-child{border-right:none}
.pb-header{padding:12px 16px;border-bottom:var(--border);display:flex;justify-content:space-between;align-items:center;background:var(--bg)}
.pb-title{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase}
.pb-score{font-family:var(--font-d);font-size:24px;letter-spacing:-1px}
.pb-metric{display:flex;align-items:center;gap:8px;padding:9px 16px;border-bottom:var(--border-light)}
.pb-metric:last-child{border-bottom:none}
.pb-m-label{font-size:11px;color:#555;flex:1;font-weight:500}
.pb-m-bar{width:64px;height:3px;background:#e8e4d0;flex-shrink:0}
.pb-m-fill{height:100%}
.pb-m-val{font-size:11px;font-weight:700;min-width:32px;text-align:right;flex-shrink:0}
.pb-m-val.hi{color:var(--green)}.pb-m-val.md{color:var(--amber)}.pb-m-val.lo{color:var(--red)}

/* ── PENALTY FEED ── */
.pen-item{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border-bottom:var(--border-light)}
.pen-item:last-child{border-bottom:none}
.pen-icon{width:24px;height:24px;border:1.5px solid;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0;margin-top:2px}
.pen-icon.err{border-color:var(--red);color:var(--red)}.pen-icon.warn{border-color:var(--amber);color:var(--amber)}
.pen-body{flex:1}
.pen-platform{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:3px}
.pen-title{font-size:12px;font-weight:700;margin-bottom:3px}
.pen-desc{font-size:11px;color:#555;line-height:1.5}
.pen-fix-btn{font-size:10px;font-weight:700;color:var(--red);letter-spacing:.5px;text-transform:uppercase;cursor:pointer;margin-top:4px;display:inline-block}

/* ── ANALYSER FLAGS ── */
.flag-row{display:flex;gap:6px;flex-wrap:wrap}
.flag{font-size:9px;font-weight:700;padding:4px 10px;border:1.5px solid;letter-spacing:1px;text-transform:uppercase;display:inline-flex;align-items:center;gap:4px}
.flag.ok{border-color:var(--green);color:var(--green);background:#f0fdf4}
.flag.warn{border-color:var(--amber);color:var(--amber);background:#fffbeb}
.flag.err{border-color:var(--red);color:var(--red);background:#fff5f5}

/* ── LANDING SPECIFIC ── */
.landing-hero{display:grid;grid-template-columns:1fr 340px;border-bottom:var(--border);min-height:420px}
.lh-left{padding:48px 40px;border-right:var(--border)}
.lh-right{display:flex;flex-direction:column;background:var(--black)}
.feature-grid{display:grid;grid-template-columns:repeat(3,1fr);border-top:var(--border)}
.feat-cell{padding:28px 24px;border-right:var(--border);border-bottom:var(--border)}
.feat-cell:nth-child(3n){border-right:none}
.feat-cell:nth-child(n+4){border-bottom:none}
.feat-icon{width:36px;height:36px;border:var(--border);display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:14px;background:var(--white)}
.how-step{display:flex;gap:20px;padding:24px;border-bottom:var(--border-light)}
.how-step:last-child{border-bottom:none}
.step-num{font-family:var(--font-d);font-size:48px;color:var(--red);line-height:1;flex-shrink:0;width:48px}
.tools-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:0}
.tool-card{padding:24px;border-right:var(--border);border-bottom:var(--border)}
.tool-card:nth-child(2n){border-right:none}

/* ── KEYWORD PAGE ── */
.kw-table-row{display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:var(--border-light);cursor:pointer}
.kw-table-row:hover{background:#fffbf0}
.kw-rank{font-family:var(--font-d);font-size:22px;color:#ccc;min-width:28px;line-height:1}
.kw-term{font-size:13px;font-weight:600;flex:1}
.kw-volume-bar{width:80px;height:3px;background:#e8e4d0}
.kw-volume-fill{height:100%;background:var(--black)}
.kw-vol-label{font-size:10px;color:#888;min-width:60px}
.kw-trend{font-size:11px;font-weight:700;min-width:48px;text-align:right}
.kw-trend.up{color:var(--green)}.kw-trend.dn{color:var(--red)}.kw-trend.flat{color:var(--amber)}
.kw-difficulty{font-size:10px;font-weight:700;padding:2px 8px;border:1.5px solid;min-width:40px;text-align:center}
.kw-difficulty.easy{border-color:var(--green);color:var(--green)}
.kw-difficulty.med{border-color:var(--amber);color:var(--amber)}
.kw-difficulty.hard{border-color:var(--red);color:var(--red)}

/* ── COMPETITOR PAGE ── */
.comp-card{border:var(--border);background:var(--white);margin-bottom:12px}
.comp-header{padding:14px 16px;display:flex;align-items:center;gap:12px;border-bottom:var(--border)}
.comp-avatar{width:36px;height:36px;background:var(--black);color:var(--bg);font-family:var(--font-d);font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:var(--border)}
.comp-name{font-size:14px;font-weight:700}
.comp-handle{font-size:11px;color:#888}
.comp-metrics{display:grid;grid-template-columns:repeat(4,1fr)}
.comp-metric{padding:12px;border-right:var(--border-light);text-align:center}
.comp-metric:last-child{border-right:none}
.comp-m-val{font-family:var(--font-d);font-size:22px;letter-spacing:-1px}
.comp-m-label{font-size:9px;color:#888;letter-spacing:1px;text-transform:uppercase;margin-top:2px}

/* ── ADMIN ── */
.admin-shell{display:flex;min-height:calc(100vh - 52px)}
.admin-sidebar{width:200px;background:var(--black);border-right:var(--border);padding:8px 0;flex-shrink:0}
.admin-main{flex:1;background:#f5f2e8;overflow:auto}
.admin-metric-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0}
.admin-metric{padding:20px;border-right:var(--border);border-bottom:var(--border);background:var(--white)}
.admin-metric:nth-child(4n){border-right:none}

/* ── SECTION HEADING ── */
.section-heading{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:var(--border)}
.sh-title-row{display:flex;align-items:center;gap:10px}
.sh-accent{width:20px;height:3px;background:var(--red)}
.sh-title{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase}

/* ── LOGIN / SIGNUP ── */
.auth-page{min-height:100vh;display:grid;grid-template-columns:1fr 1fr}
.auth-left{background:var(--black);padding:60px 48px;display:flex;flex-direction:column;justify-content:space-between;border-right:var(--border)}
.auth-right{background:var(--bg);padding:60px 48px;display:flex;flex-direction:column;justify-content:center}
.auth-form{border:var(--border);padding:32px;background:var(--white);max-width:400px;width:100%}
.form-group{margin-bottom:16px}
.form-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;display:block;margin-bottom:6px}
.form-divider{display:flex;align-items:center;gap:12px;margin:16px 0}
.form-divider-line{flex:1;height:1px;background:#ddd}
.form-divider-text{font-size:10px;color:#999;letter-spacing:1px;text-transform:uppercase}

/* ── SCHEDULER ── */
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:0}
.cal-day-header{padding:8px;text-align:center;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;border-right:var(--border-light);border-bottom:var(--border)}
.cal-day{min-height:80px;padding:8px;border-right:var(--border-light);border-bottom:var(--border-light);cursor:pointer;position:relative}
.cal-day:nth-child(7n){border-right:none}
.cal-date{font-size:11px;font-weight:600;margin-bottom:4px}
.cal-post{font-size:9px;padding:2px 5px;border:1px solid;margin-bottom:2px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.cal-post.ig{border-color:var(--ig);color:var(--ig);background:#fff0f3}
.cal-post.li{border-color:var(--li);color:var(--li);background:#eff6ff}
.cal-post.x{border-color:#555;color:#555;background:#f5f5f5}
.cal-day.today{background:#fffbf0}
.cal-day.has-post{background:#fffff5}

/* ── ANALYTICS ── */
.chart-bar-wrap{display:flex;align-items:flex-end;gap:4px;height:120px}
.chart-bar{flex:1;background:var(--black);min-width:12px;transition:height .3s;position:relative}
.chart-bar:hover{background:var(--red)}
.chart-bar-label{font-size:8px;color:#888;text-align:center;margin-top:4px;letter-spacing:.5px}

/* ── PROFILE AUDIT ── */
.audit-section{border:var(--border);background:var(--white);margin-bottom:16px}
.audit-header{padding:14px 16px;border-bottom:var(--border);display:flex;justify-content:space-between;align-items:center}
.audit-score-ring{width:60px;height:60px;border:var(--border);display:flex;align-items:center;justify-content:center;flex-direction:column;flex-shrink:0}
.audit-score-n{font-family:var(--font-d);font-size:24px;color:var(--red);line-height:1}
.audit-item{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:var(--border-light)}
.audit-item:last-child{border-bottom:none}
.audit-check{width:18px;height:18px;border:1.5px solid;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0}
.audit-check.ok{border-color:var(--green);color:var(--green);background:var(--green-light)}
.audit-check.warn{border-color:var(--amber);color:var(--amber);background:var(--amber-light)}
.audit-check.err{border-color:var(--red);color:var(--red);background:#fff5f5}
.audit-field{font-size:12px;font-weight:600;flex:1}

  <div style="padding:20px">
    <table class="table">
      <thead><tr><th>Flag Name</th><th>Description</th><th>Users</th><th>Status</th><th>Toggle</th></tr></thead>
      <tbody>
        ${flags.map(f=>`
        <tr>
          <td><code style="font-family:Courier New;font-size:11px;background:#f5f5f5;padding:2px 6px;border:1px solid #ddd">${f.name}</code></td>
          <td class="body-sm">${f.desc}</td>
          <td class="body-sm">${f.users}</td>
          <td><span class="badge badge-${f.enabled?'ok':'warn'}">${f.enabled?'ENABLED':'DISABLED'}</span></td>
          <td><button class="btn btn-${f.enabled?'outline':'red'} btn-sm">${f.enabled?'Disable':'Enable'}</button></td>
        </tr>`).join('')}
      </tbody>
    </table>
  </div>`;
}

/* ═══════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════ */
render();
</script>
</body>
</html>
